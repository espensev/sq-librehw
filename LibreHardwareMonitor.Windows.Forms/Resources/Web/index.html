<!doctype html><html lang="en" data-theme="dark"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>SQ Telemetry Console</title>
<link rel="shortcut icon" href="favicon.ico">
<link rel="stylesheet" href="console.css">
</head>
<body>
<header><div class="wrap mast">
  <div class="brand">
    <div class="sigil">SQ</div>
    <div class="wordmark"><b id="host">—</b><span>Hardware Telemetry Console</span></div>
  </div>
  <div class="spacer"></div>
  <div class="controls">
    <div class="fresh"><span class="lamp s-ok" id="freshdot"></span><span id="freshtxt">live</span></div>
    <div class="rate"><span>rate</span><input type="range" id="rate" min="1" max="10" value="2"><span id="ratev">2s</span></div>
    <button class="btn" id="pause">❚❚ Pause</button>
    <button class="btn" id="graphs" aria-pressed="false">Graphs</button>
    <button class="btn" id="theme">◐ Theme</button>
    <details class="page-menu">
      <summary class="btn">Pages</summary>
      <nav class="page-menu-panel" aria-label="Dashboard pages">
        <a href="/">Stable Dashboard</a>
        <a href="/dash/cardtruth/">Card Truth Preview</a>
        <a href="/data.json">data.json</a>
        <a href="/metrics">metrics</a>
      </nav>
    </details>
    <details class="sensors-menu" id="sensorsMenu">
      <summary class="btn" id="sensorsSummary">Sensors <span class="count" id="sensorsCount"></span></summary>
      <div class="sensors-panel" aria-label="Sensor visibility">
        <div class="sensors-tools">
          <input id="sensorsSearch" type="search" placeholder="Search all sensors" autocomplete="off" aria-label="Search all sensors">
          <button class="iconbtn" data-action="reset-hidden">Reset hidden</button>
        </div>
        <div class="sensor-list" id="sensorsList"></div>
      </div>
    </details>
  </div>
</div></header>

<main class="wrap">
  <section id="pinnedsec" style="display:none">
    <div class="sec-head"><h2>Pinned</h2><div class="rule"></div><span class="tag" id="pinnedtag">0 pinned</span></div>
    <div class="pfd" id="pinned"></div>
  </section>
  <section>
    <div class="sec-head"><h2>Primary Flight Display</h2><div class="rule"></div><span class="tag" id="pfdtag">auto-selected</span><button class="iconbtn" id="pfdReset" style="display:none" title="Return primary cards to auto">Auto</button></div>
    <div class="pfd" id="pfd"></div>
  </section>
  <section id="placardsec" style="display:none"></section>
  <section>
    <div class="sec-head"><h2>Subsystems</h2><div class="rule"></div><span class="tag" id="subtag"></span><button class="iconbtn" id="panelsReset" style="display:none" title="Return panels to default order">Reset order</button></div>
    <div class="grid" id="panels"></div>
  </section>
  <footer>
    <span id="foot-left"></span>
    <span class="legend">
      <span><span class="lamp s-ok"></span>OK</span><span><span class="lamp s-warn"></span>WATCH</span>
      <span><span class="lamp s-crit"></span>CRIT</span><span><span class="lamp s-info"></span>INFO</span>
      <span><span class="lamp s-off"></span>IDLE</span>
    </span>
  </footer>
</main>
<script src="console.js"></script>
</body></html>
