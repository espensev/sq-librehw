<!doctype html><html lang="en" data-theme="dark"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>SQ Telemetry Console</title>
<link rel="shortcut icon" href="favicon.ico">
<link rel="stylesheet" href="console.css">
</head>
<body>
<header><div class="wrap mast">
  <div class="brand">
    <div class="sigil">SQ</div>
    <div class="wordmark"><b id="host">—</b><span>Hardware Telemetry Console</span></div>
  </div>
  <nav class="dash-nav" role="tablist" aria-label="Dashboard templates">
    <a href="#/main" class="dash-tab active" data-route="main" aria-current="page">
      <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="9" y1="21" x2="9" y2="9"/></svg>
      <span class="label">Main</span>
    </a>
    <a href="#/gaming" class="dash-tab" data-route="gaming">
      <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 12h4m-2-2v4m8-2a4 4 0 11-8 0 4 4 0 018 0z"/><path d="M12 2v4m0 12v4M4.93 4.93l2.83 2.83m8.48 8.48l2.83 2.83M2 12h4m12 0h4M4.93 19.07l2.83-2.83m8.48-8.48l2.83-2.83"/></svg>
      <span class="label">Gaming</span>
    </a>
    <a href="#/storage" class="dash-tab" data-route="storage">
      <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="2" width="20" height="8" rx="2" ry="2"/><rect x="2" y="14" width="20" height="8" rx="2" ry="2"/><line x1="6" y1="6" x2="6.01" y2="6"/><line x1="6" y1="18" x2="6.01" y2="18"/></svg>
      <span class="label">Storage</span>
    </a>
  </nav>
  <div class="spacer"></div>
  <div class="controls">
    <div class="fresh"><span class="lamp s-ok" id="freshdot"></span><span id="freshtxt">live</span></div>
    <div class="rate"><span>rate</span><input type="range" id="rate" min="1" max="10" value="2"><span id="ratev">2s</span></div>
    <button class="btn" id="pause">❚❚ Pause</button>
    <button class="btn" id="graphs" aria-pressed="false">Graphs</button>
    <button class="btn" id="theme">◐ Theme</button>
    <button class="btn" id="customize">Customize</button>
  </div>
</div></header>

<main class="wrap">
  <section id="pinnedsec" style="display:none">
    <div class="sec-head"><h2>Pinned</h2><div class="rule"></div><span class="tag" id="pinnedtag">0 pinned</span></div>
    <div class="pfd" id="pinned"></div>
  </section>
  <section>
    <div class="sec-head"><h2>Primary Flight Display</h2><div class="rule"></div><span class="tag" id="pfdtag">auto-selected</span></div>
    <div class="pfd" id="pfd"></div>
  </section>
  <section id="placardsec" style="display:none"></section>
  <section>
    <div class="sec-head"><h2>Subsystems</h2><div class="rule"></div><span class="tag" id="subtag"></span></div>
    <div class="grid" id="panels"></div>
  </section>
  <footer>
    <span id="foot-left"></span>
    <span class="legend">
      <span><span class="lamp s-ok"></span>OK</span><span><span class="lamp s-warn"></span>WATCH</span>
      <span><span class="lamp s-crit"></span>CRIT</span><span><span class="lamp s-info"></span>INFO</span>
      <span><span class="lamp s-off"></span>IDLE</span>
    </span>
  </footer>
</main>
<div class="scrim" id="customizeScrim"></div>
<aside class="drawer" id="customizeDrawer" aria-hidden="true" aria-label="Customize dashboard">
  <div class="drawer-head">
    <div><b>Customize</b><span>Browser-local dashboard state</span></div>
    <button class="iconbtn" id="drawerClose" aria-label="Close customize panel">Close</button>
  </div>
  <div class="tabs" role="tablist">
    <button class="tab active" data-tab="hidden" role="tab">Hidden</button>
    <button class="tab" data-tab="cards" role="tab">Cards</button>
    <button class="tab" data-tab="layout" role="tab">Layout</button>
  </div>
  <div class="pane" data-pane="hidden">
    <div class="drawer-tools">
      <input id="hiddenSearch" type="search" placeholder="Search sensors">
      <button class="iconbtn" data-action="reset-hidden">Reset hidden</button>
    </div>
    <div class="sensor-list" id="hiddenList"></div>
  </div>
  <div class="pane" data-pane="cards" hidden>
    <div class="drawer-tools">
      <input id="cardSearch" type="search" placeholder="Search sensors">
      <button class="iconbtn" data-action="clear-pinned">Clear pinned</button>
    </div>
    <div class="order-list" id="pinnedList"></div>
    <div class="sensor-list" id="cardList"></div>
  </div>
  <div class="pane" data-pane="layout" hidden>
    <div class="drawer-tools">
      <button class="iconbtn" data-action="reset-panels">Reset panel order</button>
    </div>
    <div class="order-list" id="panelOrderList"></div>
  </div>
</aside>
<script src="console.js"></script>
</body></html>
